# cargo-deny configuration (https://embarkstudios.github.io/cargo-deny/).
#
# Complements the dedicated RustSec `cargo audit` job: `.cargo/audit.toml` owns *advisory* policy;
# cargo-deny adds the license posture, source restriction, and dependency-bloat guard. Checked over
# the full feature set so the opt-in `local-embed` ML tree is covered too.

[graph]
all-features = true

[licenses]
# Only permissive licenses compatible with mnema's own MIT OR Apache-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions bloat the tree — surface them, but don't fail the build over transitive
# diamond deps we don't control.
multiple-versions = "warn"
# A wildcard version requirement in our own manifests is a mistake.
wildcards = "deny"

[sources]
# Every dependency must come from crates.io — no unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"

[advisories]
# Advisories are owned by the `cargo audit` job (.cargo/audit.toml). Mirror its two accepted
# unmaintained-crate findings here so cargo-deny doesn't double-fail on them; any *new* advisory
# still fails (in both jobs).
ignore = [
    "RUSTSEC-2025-0119", # number_prefix unmaintained — local-embed-only (hf-hub -> indicatif)
    "RUSTSEC-2024-0436", # paste unmaintained — local-embed-only (candle / tokenizers / gemm)
]
