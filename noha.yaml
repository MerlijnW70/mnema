# noha.yaml — behavioral mutation-coverage config (workspace-wide prober).
# A tiny YAML subset: scalars, comments, and one level of `- ` lists.
# Inline comments: ` # ` (hash preceded by a space AND followed by a space or the end of
# the line) starts a comment; a `#` glued to text (`dir #1/file.py`) stays in the value.
#
# Two-crate workspace, two noha surfaces:
#   - THIS file: `noha prober` at the root — behavioral mutation coverage over BOTH crates
#     (the umbrella's logic + the zero-dependency core), killed by the workspace test suite.
#   - mnema-core/noha.yaml: `noha gate` in the leaf — the zero-dependency/boundary
#     certification the umbrella (which legitimately carries optional deps) cannot claim.
stack: rust
root: .
baseline: .noha/baseline.tsv
max: 500
# The full feature set the suite compiles hermetically: secure (crypto), mcp (server),
# http-embed (local-endpoint embedder — its request/response logic is unit-tested offline).
# `local-embed` (candle) is deliberately absent: model download + a transformer forward pass
# is not hermetic, deterministic logic a mutation ratchet can pin (see src/model_embed.rs docs).
test: cargo test --workspace --features secure,mcp,http-embed --quiet
guard: cargo clippy --workspace --all-targets --features secure,mcp,http-embed -- -D warnings
build: cargo test --no-run --workspace --features secure,mcp,http-embed --quiet
# TIA (Test-Impact Analysis): `focus` is the single-test command template — `{test}` is
# replaced by the remembered killer test's name. Operator contract for `focus_kill_codes`:
# a listed exit code must mean "a test failed" and NOTHING else. cargo returns 101 for a
# failing test and only for harness-level failure — safe to certify a fast kill.
focus: cargo test --workspace --features secure,mcp,http-embed --quiet {test}
focus_kill_codes: 101
# The probed surface: every line of logic in both crates. ONE exclusion, by design:
# src/model_embed.rs is I/O + candle model glue below the behavioral waterline (its own
# doc header declares this); the load-bearing math it rests on (mean_pool, l2_normalize)
# lives in mnema-core/src/embed.rs and IS probed. Because of that exclusion,
# `require_full_surface` stays false HERE — the leaf's own config turns it on.
sources:
  - src/bin/mnema-server.rs
  - src/bin/mnema.rs
  - src/facade.rs
  - src/http_embed.rs
  - src/keyfile.rs
  - src/lib.rs
  - src/store.rs
  - mnema-core/src/embed.rs
  - mnema-core/src/lib.rs
  - mnema-core/src/retrieval.rs
  - mnema-core/src/semantic.rs
  - mnema-core/src/vector.rs
  - mnema-core/src/working.rs
# Architectural constraints (noha gate enforces these, language-agnostic) — mnema's real
# promises, mechanically held:
#   - filesystem access stays in the keyfile module and the two binaries (the library
#     core — facade, store, http_embed, and ALL of mnema-core — does no file I/O);
#   - process control stays in the binaries (exit) and the keyfile module (the Windows
#     owner-only ACL restriction shells out to icacls);
#   - outbound HTTP stays in the one opt-in embedder module, via ureq;
#   - all raw socket access (std::net) is likewise confined to that one module — nowhere else
#     in the umbrella may open a socket ("never leaks to the cloud" starts here).
constraints:
  - confine std::fs src/keyfile.rs src/bin/mnema-server.rs src/bin/mnema.rs
  - confine std::process src/bin/mnema-server.rs src/bin/mnema.rs src/keyfile.rs
  - confine ureq src/http_embed.rs
  - confine std::net src/http_embed.rs
overflow_checks: false
# fail-closed lint: every silently-discarded Result error in the probed sources must
# propagate or carry a `// noha: <reason>` justification.
fail_closed: true
