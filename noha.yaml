# noha.yaml — behavioral mutation-coverage config (generated by `noha init`).
# A tiny YAML subset: scalars, comments, and one level of `- ` lists.
# Inline comments: ` # ` (hash preceded by a space AND followed by a space or the end of
# the line) starts a comment; a `#` glued to text (`dir #1/file.py`) stays in the value.
stack: rust
root: .
baseline: .noha/baseline.tsv
max: 500
test: cargo test --features secure --quiet
guard: cargo clippy --all-targets --features secure -- -D warnings
build: cargo test --features secure --no-run --quiet
# TIA (Test-Impact Analysis): `focus` is the single-test command template — `{test}` is
# replaced by the remembered killer test's name. Operator contract for `focus_kill_codes`:
# a listed exit code must mean "a test failed" and NOTHING else — never a usage error,
# a no-tests-collected exit, or any harness artifact. Only a listed code can certify a
# fast kill; every other exit falls back to the full kill set. When unsure, list nothing:
# you lose speed, never truth.
focus: cargo test --features secure --quiet {test}
focus_kill_codes: 101
sources:
  # NOTE: src/bin/engram.rs is deliberately NOT probed — it is I/O orchestration
  # *below noha's behavioral waterline* (see its module doc; the same rule that excludes
  # scripts/evolve.sh). Every real decision lives in the ratchet-pinned library below.
  - src/embed.rs
  - src/facade.rs
  - src/lib.rs
  - src/retrieval.rs
  - src/semantic.rs
  - src/store.rs
  - src/vector.rs
  - src/working.rs
