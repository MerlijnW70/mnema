name: release

# Build prebuilt `mnema` + `mnema-server` binaries for every major platform when a version tag is
# pushed, and attach them to a GitHub Release. The install scripts (install.sh / install.ps1) then
# download these — so users get mnema with one command and no Rust toolchain.
#
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --verify-tag

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: false }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: true }
          - { os: macos-latest, target: aarch64-apple-darwin, cross: false }
          - { os: macos-latest, target: x86_64-apple-darwin, cross: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, cross: false }
    steps:
      - uses: actions/checkout@v4

      # Pin to match rust-toolchain.toml / CI, and add this job's target to that toolchain
      # (adding it to `stable` would not help a build the pinned 1.96 runs).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96"
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # `--features mcp` pulls in `secure`, so both bins' required-features are satisfied and
      # `--bins` builds `mnema` and `mnema-server` in one shot.
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --features mcp --bins --target ${{ matrix.target }}
          else
            cargo build --release --features mcp --bins --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          stage="mnema-${{ github.ref_name }}-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          mkdir "$stage"
          # LICENSE files are optional; skip them if they aren't present yet.
          cp README.md "$stage/" 2>/dev/null || true
          cp LICENSE-MIT LICENSE-APACHE "$stage/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$bindir/mnema.exe" "$bindir/mnema-server.exe" "$stage/"
            7z a "$stage.zip" "$stage" >/dev/null
            echo "ASSET=$stage.zip" >> "$GITHUB_ENV"
          else
            cp "$bindir/mnema" "$bindir/mnema-server" "$stage/"
            tar czf "$stage.tar.gz" "$stage"
            echo "ASSET=$stage.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "$ASSET" --clobber

  # After every platform asset is uploaded, publish a single SHA256SUMS the installers verify
  # against — so `curl | sh` / `irm | iex` can't be silently fed a tampered or corrupt binary.
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # `gh release` needs a repo context (it shells out to git), so check out first.
      - uses: actions/checkout@v4
      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            --pattern '*.tar.gz' --pattern '*.zip' --dir "$tmp"
          ( cd "$tmp" && sha256sum mnema-* > SHA256SUMS && cat SHA256SUMS )
          gh release upload "${{ github.ref_name }}" "$tmp/SHA256SUMS" --clobber

  # Regenerate the Homebrew tap formula from this release's SHA256SUMS and push it, so
  # `brew install MerlijnW70/mnema/mnema` never lags behind the GitHub release.
  #
  # One-time setup: a token with push access to MerlijnW70/homebrew-mnema as a repo secret
  # named HOMEBREW_TAP_TOKEN (gh secret set HOMEBREW_TAP_TOKEN). Without it the job skips
  # with a warning instead of failing the release.
  homebrew:
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Bump the tap formula to ${{ github.ref_name }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set - skipping the Homebrew tap bump (the formula stays at its current version)"
            exit 0
          fi
          # Strip any whitespace/newlines picked up when the secret was pasted - a polluted
          # value splits the clone URL and git fails with "Bad hostname". PATs contain no
          # whitespace, so trimming only ever removes storage pollution.
          TAP_TOKEN="$(printf '%s' "$TAP_TOKEN" | tr -d '[:space:]')"
          if ! git ls-remote "https://x-access-token:$TAP_TOKEN@github.com/MerlijnW70/homebrew-mnema.git" >/dev/null 2>&1; then
            echo "::error::HOMEBREW_TAP_TOKEN is rejected by GitHub - re-set it with: gh secret set HOMEBREW_TAP_TOKEN (fine-grained PAT, Contents read/write on MerlijnW70/homebrew-mnema)"
            exit 1
          fi
          ver="${TAG#v}"
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/$REPO/releases/download/$TAG/SHA256SUMS" -o "$tmp/SHA256SUMS"
          sha() { awk -v f="mnema-$TAG-$1" '$2 == f {print $1}' "$tmp/SHA256SUMS"; }
          for t in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-musl x86_64-unknown-linux-musl; do
            [ -n "$(sha "$t.tar.gz")" ] || { echo "missing SHA256SUMS entry for $t"; exit 1; }
          done
          cat > "$tmp/mnema.rb" <<EOF
          class Mnema < Formula
            desc "Local, encrypted memory layer for AI agents - never forgets, never leaks to the cloud"
            homepage "https://github.com/$REPO"
            version "$ver"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "https://github.com/$REPO/releases/download/$TAG/mnema-$TAG-aarch64-apple-darwin.tar.gz"
                sha256 "$(sha aarch64-apple-darwin.tar.gz)"
              end
              on_intel do
                url "https://github.com/$REPO/releases/download/$TAG/mnema-$TAG-x86_64-apple-darwin.tar.gz"
                sha256 "$(sha x86_64-apple-darwin.tar.gz)"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/$REPO/releases/download/$TAG/mnema-$TAG-aarch64-unknown-linux-musl.tar.gz"
                sha256 "$(sha aarch64-unknown-linux-musl.tar.gz)"
              end
              on_intel do
                url "https://github.com/$REPO/releases/download/$TAG/mnema-$TAG-x86_64-unknown-linux-musl.tar.gz"
                sha256 "$(sha x86_64-unknown-linux-musl.tar.gz)"
              end
            end

            def install
              bin.install "mnema", "mnema-server"
            end

            test do
              assert_match(/[0-9a-f]{64}/, shell_output("#{bin}/mnema keygen"))
            end
          end
          EOF
          git clone "https://x-access-token:$TAP_TOKEN@github.com/MerlijnW70/homebrew-mnema.git" "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp "$tmp/mnema.rb" "$tmp/tap/Formula/mnema.rb"
          cd "$tmp/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "formula already at $ver - nothing to push"
          else
            git commit -am "mnema $TAG"
            git push
          fi
