name: security-audit

# Supply-chain gate. Two jobs over the committed, pinned Cargo.lock:
#   - audit: RustSec advisories (cargo-audit) — fails on any vulnerability.
#   - deny:  licenses, sources, and dependency bans (cargo-deny).
# Runs when manifests / the lockfile / the configs change, on every PR, and — crucially — on a
# weekly schedule, so a newly-published advisory against an existing dependency is caught even when
# nothing in the repo changed. Accepted advisories live in .cargo/audit.toml (mirrored in deny.toml).
on:
  push:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".cargo/audit.toml"
      - "deny.toml"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".cargo/audit.toml"
      - "deny.toml"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit — fail on any vulnerability or unaccepted advisory
        run: cargo audit --deny warnings

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny — licenses, sources, bans, advisories
        run: cargo deny check
